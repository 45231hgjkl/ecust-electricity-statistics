<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电费统计 · 华理</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0e14;
      --card:      #161a22;
      --card-alt:  #1c202a;
      --border:    #2a2f3a;
      --text:      #e4e6ea;
      --text-dim:  #7d8390;
      --accent:    #5bc0eb;
      --green:     #34d399;
      --red:       #f87171;
      --orange:    #fbbf24;
      --radius:    16px;
      --shadow:    0 4px 24px rgba(0,0,0,.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 64px;
      line-height: 1.5;
    }

    .app {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ===== Header ===== */
    .header {
      text-align: center;
      padding: 12px 0 4px;
    }
    .header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: .5px;
    }

    /* ===== Card base ===== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      animation: fadeInUp .5s ease both;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
    .card:nth-child(2) { animation-delay: 0s; }
    .card:nth-child(3) { animation-delay: .08s; }
    .card:nth-child(4) { animation-delay: .16s; }
    .card:nth-child(5) { animation-delay: .24s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== Hero card ===== */
    .hero {
      text-align: center;
      padding: 36px 24px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(91,192,235,.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-value {
      font-size: clamp(3rem, 8vw, 4.5rem);
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -1px;
      position: relative;
      transition: color .3s;
    }
    .hero-value.warning { color: var(--red); animation: pulse-warn 2s infinite; }
    .hero-unit {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-dim);
      margin-left: 4px;
    }
    @keyframes pulse-warn {
      0%,100% { opacity: 1; }
      50%     { opacity: .6; }
    }
    .hero-time {
      margin-top: 10px;
      font-size: .82rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .hero-time .dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 1.6s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ===== Stat row (two cards) ===== */
    .stat-row {
      display: flex;
      gap: 18px;
    }
    .stat-card {
      flex: 1;
      text-align: center;
      padding: 22px 16px;
    }
    .stat-label {
      font-size: .82rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 1.65rem;
      font-weight: 700;
    }
    .stat-sub {
      font-size: .78rem;
      color: var(--text-dim);
      margin-top: 6px;
    }
    .change-up   { color: var(--green); }
    .change-down { color: var(--red); }
    .change-zero { color: var(--text-dim); }
    .stat-value .arrow {
      display: inline-block;
      margin-right: 4px;
      animation: bounce-arrow .6s ease both;
    }
    @keyframes bounce-arrow {
      0%   { transform: translateY(0); }
      40%  { transform: translateY(-6px); }
      60%  { transform: translateY(2px); }
      80%  { transform: translateY(-3px); }
      100% { transform: translateY(0); }
    }

    /* ===== Chart card ===== */
    .chart-card { padding: 20px 12px 12px; }
    .chart-card .chart-title {
      font-size: .88rem;
      color: var(--text-dim);
      letter-spacing: .5px;
      padding: 0 12px 8px;
    }
    #chart-container { width: 100%; height: 360px; }

    /* ===== Responsive: mobile ===== */
    @media (max-width: 600px) {
      body { padding: 16px 10px 48px; }
      .app  { gap: 14px; }
      .card { padding: 18px 14px; border-radius: 12px; }
      .hero { padding: 28px 16px; }
      .hero-value { font-size: 2.8rem; }
      .stat-row { flex-direction: column; gap: 14px; }
      .stat-value { font-size: 1.4rem; }
      #chart-container { height: 280px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header"><h1>⚡ 华理电费统计</h1></div>

    <!-- Hero -->
    <div class="card hero" id="hero-card">
      <div id="hero-value" class="hero-value">--<span class="hero-unit">kWh</span></div>
      <div class="hero-time">
        <span class="dot"></span>
        <span id="hero-time-text">加载中…</span>
      </div>
    </div>

    <!-- Stat row -->
    <div class="stat-row">
      <div class="card stat-card" id="change-card">
        <div class="stat-label">较前一日</div>
        <div class="stat-value" id="change-value">--</div>
        <div class="stat-sub" id="change-sub"></div>
      </div>
      <div class="card stat-card" id="avg-card">
        <div class="stat-label">近7天日均用电</div>
        <div class="stat-value" id="avg-value">--</div>
        <div class="stat-sub" id="avg-sub"></div>
      </div>
    </div>

    <!-- Chart -->
    <div class="card chart-card">
      <div class="chart-title">📊 近7天每日用电量</div>
      <div id="chart-container"></div>
    </div>
  </div>

  <script src="https://unpkg.com/@antv/g2plot@latest/dist/g2plot.min.js"></script>
  <script src="./data.js"></script>
  <script>
  (function () {
    // ----- helpers -----
    function dateStr(s) {
      // "2026-05-27" or "2026-05-29 07:42:09" → "2026-05-27"
      return s.slice(0, 10);
    }
    function parseDate(s) {
      // always parse as local midnight to avoid UTC/local mismatch
      var parts = s.slice(0, 10).split('-');
      return new Date(+parts[0], +parts[1] - 1, +parts[2]);
    }
    function fmtNum(n, digits) {
      if (digits === undefined) digits = 1;
      return Number(n).toFixed(digits);
    }

    // ----- data -----
    if (typeof data === 'undefined' || !Array.isArray(data) || data.length === 0) {
      document.getElementById('hero-value').innerHTML = '无数据<span class="hero-unit">kWh</span>';
      document.getElementById('hero-time-text').textContent = '请先运行数据采集';
      return;
    }

    // sort by time ascending
    const sorted = data.slice().sort(function (a, b) {
      return (parseDate(a.time) || 0) - (parseDate(b.time) || 0);
    });

    var latest = sorted[sorted.length - 1];
    var prev   = sorted.length > 1 ? sorted[sorted.length - 2] : null;

    // ----- hero -----
    var heroEl    = document.getElementById('hero-value');
    var heroTime  = document.getElementById('hero-time-text');
    var heroCard  = document.getElementById('hero-card');
    var warningThreshold = 10; // match config.toml default

    heroEl.innerHTML = fmtNum(latest.kWh, 1) + '<span class="hero-unit">kWh</span>';
    heroTime.textContent = '获取时间：' + latest.time;

    if (latest.kWh < warningThreshold) {
      heroEl.classList.add('warning');
    }

    // ----- day-over-day change -----
    var changeEl   = document.getElementById('change-value');
    var changeSub  = document.getElementById('change-sub');

    if (prev) {
      var diff = latest.kWh - prev.kWh;
      var absDiff = Math.abs(diff);
      var arrow, cls;
      if (diff > 0.01)      { arrow = '↑'; cls = 'change-up';   }
      else if (diff < -0.01) { arrow = '↓'; cls = 'change-down'; }
      else                   { arrow = '→'; cls = 'change-zero'; }

      changeEl.innerHTML = '<span class="arrow ' + cls + '">' + arrow + '</span>' +
                           '<span class="' + cls + '">' + fmtNum(absDiff) + ' kWh</span>';
      changeSub.textContent = diff > 0
        ? '较昨日增加（可能充了电）'
        : (diff < 0 ? '较昨日减少（正常消耗）' : '无变化');
    } else {
      changeEl.innerHTML = '<span class="change-zero">--</span>';
      changeSub.textContent = '需要至少两条数据';
    }

    // ----- daily usage & weekly average -----
    var dailyUsages = [];
    for (var i = 1; i < sorted.length; i++) {
      var use = sorted[i - 1].kWh - sorted[i].kWh;
      dailyUsages.push({
        date: dateStr(sorted[i].time),
        usage: parseFloat(Math.max(0, use).toFixed(2))
      });
    }

    var recentUsages = dailyUsages.slice(-7);
    var avgEl   = document.getElementById('avg-value');
    var avgSub  = document.getElementById('avg-sub');

    if (recentUsages.length > 0) {
      var total = 0;
      for (var u = 0; u < recentUsages.length; u++) total += recentUsages[u].usage;
      var avg = total / recentUsages.length;
      avgEl.innerHTML = fmtNum(avg, 1) + ' <span style="font-size:.9rem;color:var(--text-dim)">kWh</span>';
      avgSub.textContent = '基于最近 ' + recentUsages.length + ' 天数据';
    } else {
      avgEl.textContent = '--';
      avgSub.textContent = '需要至少两条数据';
    }

    // ----- G2Plot chart: 7-day daily usage (bar) -----
    var chartData = dailyUsages.slice(-7);
    if (chartData.length > 0 && typeof G2Plot !== 'undefined') {
      var plot = new G2Plot.Column('chart-container', {
        data: chartData,
        xField: 'date',
        yField: 'usage',
        color: '#5bc0eb',
        columnStyle: { radius: [6, 6, 0, 0] },
        label: {
          position: 'top',
          style: { fill: '#7d8390', fontSize: 11 }
        },
        tooltip: {
          formatter: function (d) { return { name: '用电量', value: fmtNum(d.usage, 2) + ' kWh' }; }
        },
        yAxis: {
          title: { text: 'kWh', style: { fill: '#7d8390' } },
          label: { style: { fill: '#7d8390' } },
          grid: { line: { style: { stroke: '#2a2f3a', lineDash: [4,4] } } }
        },
        xAxis: {
          label: { style: { fill: '#7d8390' }, autoRotate: false },
          grid: { line: { style: { stroke: '#2a2f3a' } } }
        },
        animation: { appear: { animation: 'wave-in', duration: 800 } }
      });
      plot.render();

      // responsive resize
      window.addEventListener('resize', function () { plot.destroy(); plot.render(); });
    }
  })();
  </script>
</body>
</html>
