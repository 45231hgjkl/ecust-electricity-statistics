name: AutoRecord
on:
  push:
    paths-ignore:
      - "data.js"  # 避免 workflow 自身提交触发无限循环
  workflow_dispatch:
  schedule:
    - cron: "30 00 * * *"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r requirements.txt
      - name: Run
        env:
          URL: ${{ secrets.URL }}
        run: |
          python main.py
      - name: git config
        run: |-
          git config --global user.name "Github Actions"
          git config --global user.email "actions@gmail.com"
      - name: Push
        run: |-
          git diff
          git add -A
          git add -f data.js  # 强制添加 data.js，绕过 .gitignore
          git status
          git commit -m "update by github actions"
          git push
